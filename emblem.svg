<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Metallic Circle -->
  <circle cx="150" cy="150" r="140" fill="url(#goldGrad)" stroke="#78350f" stroke-width="2" filter="url(#shadow)" />
  
  <!-- Inner Ring Detail -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="#78350f" stroke-width="1" stroke-dasharray="10,5" opacity="0.3" />
  
  <!-- Circular Text Path -->
  <defs>
    <path id="circlePath" d="M 150, 150 m -110, 0 a 110,110 0 1,1 220,0 a 110,110 0 1,1 -220,0" />
  </defs>
  
  <text fill="#0f172a" font-family="Outfit, sans-serif" font-weight="800" font-size="16" letter-spacing="2">
    <textPath href="#circlePath" startOffset="25%">THE MASTERGRID</textPath>
    <textPath href="#circlePath" startOffset="75%">TIMETABLE SYSTEM</textPath>
  </text>

  <!-- Central Logo Content -->
  <g transform="translate(75, 75) scale(0.75)">
    <!-- Grid -->
    <g stroke="#78350f" stroke-width="1" opacity="0.4">
      <line x1="20" y1="20" x2="180" y2="20" />
      <line x1="20" y1="50" x2="180" y2="50" />
      <line x1="20" y1="80" x2="180" y2="80" />
      <line x1="20" y1="110" x2="180" y2="110" />
      <line x1="20" y1="140" x2="180" y2="140" />
      <line x1="20" y1="20" x2="20" y2="140" />
      <line x1="50" y1="20" x2="50" y2="140" />
      <line x1="80" y1="20" x2="80" y2="140" />
      <line x1="110" y1="20" x2="110" y2="140" />
      <line x1="140" y1="20" x2="140" y2="140" />
      <line x1="170" y1="20" x2="170" y2="140" />
    </g>
    
    <!-- MG Monogram -->
    <path d="M40 130 V30 L90 80 L140 30 V130" fill="none" stroke="#0f172a" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" />
    <path d="M140 80 V110 Q140 130 120 130 H80 Q60 130 60 110 V90" fill="none" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" />
    <path d="M90 110 H130 V80 H110" fill="none" stroke="#f97316" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>
